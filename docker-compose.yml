services:
  backup:
    image: offen/docker-volume-backup:v2
    container_name: docker-backup-manager
    restart: always
    environment:
      # Schedulazione: Ogni Domenica (0) alle 03:00 del mattino
      - BACKUP_CRON_EXPRESSION=0 3 * * 0
      
      # Teniamo i backup delle ultime 4 settimane
      - BACKUP_RETENTION_DAYS=14
      
      - BACKUP_FILENAME=full-system-backup-%Y-%m-%dT%H-%M-%S.tar.gz
      - STOP_CONTAINERS=all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      
      # 1. Salva tutta l'infrastruttura e i Bind Mounts
      - /home/user/dockerhub:/backup/dockerhub:ro
      
      # 2. SALVATAGGIO DEI NAMED VOLUMES (quelli reali, non bind mounts)
      - pgadmin_pgadmin_data:/backup/pgadmin_pgadmin_data:ro
      - holos_bimgis_rustfs_models:/backup/holos_bimgis_rustfs_models:ro
      - holos_bimgis_rustfs_progetti:/backup/holos_bimgis_rustfs_progetti:ro
      
      # 3. La destinazione finale
      - /media/old/docker_backup:/archive

volumes:
  pgadmin_pgadmin_data:
    external: true
  holos_bimgis_rustfs_models:
    external: true
  holos_bimgis_rustfs_progetti:
    external: true
